{% extends 'base.html' %}
{% block title %}Admin Login – SeminarHub{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-sm-8">
    <div class="card border-0 shadow">
      <div class="card-header bg-dark text-white text-center py-4">
        <h4 class="mb-0 fw-bold">
          <i class="bi bi-shield-lock me-2"></i>Admin Login
        </h4>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('admin.login') }}">
          <div class="mb-4">
            <label class="form-label fw-semibold">Admin Password</label>
            <input type="password" name="password"
                   class="form-control form-control-lg"
                   placeholder="Enter admin password"
                   autofocus required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-dark btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </div>
        </form>
        <p class="text-center text-muted small mt-3">
          Default password: <code>admin123</code> &mdash; change via <code>ADMIN_PASSWORD</code> env var.
        </p>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="{{ url_for('main.index') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Back to Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
